<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI时间序列预测系统</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    /* 学号姓名固定展示（在这里改你的信息） */
    .user {
      position: fixed;
      top: 0;
      left: 0;
      background: #2563eb;
      color: white;
      padding: 10px 20px;
      border-radius: 0 0 12px 0;
      font-weight: bold;
      z-index: 999;
    }

    body {
      padding: 80px 20px;
      background: #f8fafc;
      max-width: 1000px;
      margin: 0 auto;
    }

    .box {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 10px #0001;
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 16px;
      color: #1e293b;
    }

    .params {
      display: flex;
      gap: 16px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    .param-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input {
      width: 80px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    #chart {
      width: 100%;
      height: 400px;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <!-- 在这里修改为你的学号和姓名 -->
  <div class="user">
    学号：423830134 &nbsp;&nbsp; 姓名：肖哲
  </div>

  <div class="box">
    <h2>AI时间序列预测（LSTM）</h2>
    <p>模拟数据预测，可用于气温、流量、销量、股价等时序预测</p>

    <div class="params">
      <div class="param-item">
        <label>训练轮数：</label>
        <input type="number" id="epochs" value="50" />
      </div>
      <div class="param-item">
        <label>时间步长：</label>
        <input type="number" id="timeStep" value="5" />
      </div>
      <div class="param-item">
        <label>预测长度：</label>
        <input type="number" id="predictLen" value="20" />
      </div>
    </div>

    <button onclick="startPredict()">开始训练并预测</button>
    <div id="status" style="margin-top:10px; color:#666;"></div>
  </div>

  <div class="box">
    <canvas id="chart"></canvas>
  </div>

  <script>
    let ctx = document.getElementById('chart').getContext('2d');
    let chart;

    // 生成模拟时序数据
    function generateData(len = 100) {
      let arr = [];
      for (let i = 0; i < len; i++) {
        let v = Math.sin(i * 0.1) + Math.random() * 0.3 + i * 0.02;
        arr.push(v);
      }
      return arr;
    }

    // 构建时序样本
    function createDataset(data, timeStep) {
      let X = [], Y = [];
      for (let i = 0; i < data.length - timeStep; i++) {
        X.push(data.slice(i, i + timeStep));
        Y.push(data[i + timeStep]);
      }
      return { X, Y };
    }

    // 构建极简 LSTM 模型
    function buildModel(timeStep) {
      const model = tf.sequential();
      model.add(tf.layers.lstm({ units: 32, inputShape: [timeStep, 1] }));
      model.add(tf.layers.dense({ units: 1 }));
      model.compile({ optimizer: tf.train.adam(0.001), loss: 'mse' });
      return model;
    }

    async function startPredict() {
      const epochs = parseInt(document.getElementById('epochs').value);
      const timeStep = parseInt(document.getElementById('timeStep').value);
      const predictLen = parseInt(document.getElementById('predictLen').value);
      const status = document.getElementById('status');

      status.textContent = "正在生成数据...";
      const rawData = generateData(100);

      status.textContent = "构建数据集...";
      const { X, Y } = createDataset(rawData, timeStep);

      const xs = tf.tensor3d(X, [X.length, timeStep, 1]);
      const ys = tf.tensor2d(Y, [Y.length, 1]);

      const model = buildModel(timeStep);

      status.textContent = "开始训练...";
      await model.fit(xs, ys, {
        epochs,
        batchSize: 4,
        verbose: 0,
        callbacks: {
          onEpochEnd: (e) => {
            status.textContent = `训练中：${e+1}/${epochs}`;
          }
        }
      });

      status.textContent = "开始预测...";
      // 多步预测
      let predictSeq = rawData.slice(-timeStep);
      let predicts = [];

      for (let i = 0; i < predictLen; i++) {
        const input = tf.tensor3d([predictSeq.slice(-timeStep)], [1, timeStep, 1]);
        const out = model.predict(input);
        const val = (await out.array())[0][0];
        predicts.push(val);
        predictSeq.push(val);
      }

      // 绘图
      const allX = Array.from({ length: rawData.length }, (_, i) => i);
      const predX = Array.from({ length: predicts.length }, (_, i) => i + rawData.length);

      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          datasets: [
            {
              label: '历史数据',
              data: rawData.map((v,i)=>({x:i,y:v})),
              borderColor: '#2563eb',
              fill: false
            },
            {
              label: 'AI预测',
              data: predicts.map((v,i)=>({x:i+rawData.length,y:v})),
              borderColor: '#e11d48',
              borderDash: [5,5],
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          scales: {
            x: { type: 'linear', position: 'bottom' },
            y: { title: { display: true, text: '数值' } }
          }
        }
      });

      status.textContent = "预测完成！";
    }
  </script>
</body>
</html>
